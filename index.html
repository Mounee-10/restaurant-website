<!DOCTYPE html>
<html>
<head>
    <title>Foodie Kitchen</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin: 0;
            margin: 0;
            min-height: 100vh;
            background-image:
            url('https://images.unsplash.com/photo-1504674900247-0877df9cc836');
            background-size: cover;
            background-position: center;
        }

        h1 {
            background-color: black;
            color: white;
            padding: 20px;
        }

        p {
            font-size: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: black;
            color: white;
            border-radius: 5px;
        }

    .card {
        width: 300px;
        margin: 15px auto;
        padding: 15px;
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 2px 8px gray;
        font-size: 22px;
    }

    footer {
        margin-top: 30px;
        padding: 15px;
        background-color: black;
        color: white;
    }
</style>
</head>
<body>

    <h1>Welcome to Foodie Kitchen</h1>
    <p>Fresh and delicious food delivered fast</p>
    <button>Order Now</button>

    <h2>Our Menu</h2>
    <div class="card">Chicken Biryani - ₹199</div>
    <div class="card">Veg Fried Rice - ₹149</div>
    <div class="card">Noodles - ₹129</div>
    <h2>Today's Special Offer</h2>
    <div class="card">Buy 1 Biryani get 1 Cool Drink Free</div>

    <h2>Contact Us</h2>
    <div class="card">Location: Vijayawad</div>

    <footer>
    © 2026 Foodie Kitchen | All Rights Reserved
</footer>

</body>
</html>
